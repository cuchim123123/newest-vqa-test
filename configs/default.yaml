# ═══════════════════════════════════════════════════════════════════
# VQA Project — Configuration (Optimized for Kaggle NVIDIA Tesla T4 16GB)
# ═══════════════════════════════════════════════════════════════════

seed: 42
device: "auto"                          # auto-detect CUDA/CPU
log_dir: "logs"
ckpt_dir: "checkpoints"

# ── Data ──
data:
  hf_id: "HuggingFaceM4/A-OKVQA"
  train_ratio: 0.85
  freq_threshold: 3                   # freq>=3 filters noise on larger vocab
  image_size: 224
  expand_rationales: false

# ── Model ──
model:
  embed_size: 300                     # GloVe 300d
  hidden_size: 512                    # BiLSTM + decoder hidden dim
  num_layers: 2                       # 2-layer LSTM
  dropout: 0.3                        # 0.3 — good balance for this architecture
  use_pretrained_cnn: true            # Overridden per variant
  use_attention: true                 # Overridden per variant
  bidirectional: true                 # BiLSTM question encoder
  num_answers: 0                      # Generative only — no classification head
  cls_weight: 0.0                     # Disabled — pure generative training

# ── Training (Kaggle T4 optimized) ──
train:
  epochs: 30                          # 30 epochs — more data needs more passes
  batch_size: 48                      # Match previous stable/realistic log profile
  learning_rate: 3.0e-4               # Standard LR for larger dataset
  label_smoothing: 0.1                # Prevents overconfident logits
  grad_clip: 1.0                      # Tighter clipping — prevents gradient spikes
  patience: 6                         # Moderate patience — larger data is less noisy
  beam_width: 5                       # 5-beam search for quality generation
  len_alpha: 0.7                      # Length normalization — favor slightly longer answers
  rep_penalty: 1.5                    # Stronger repetition penalty
  min_gen_len: 3                      # Min tokens before EOS allowed
  tf_start: 1.0                       # Start with full teacher forcing
  tf_end: 0.4                         # End at 0.4 — never go below to prevent decoder collapse
  scheduler: "cosine"                 # Cosine annealing with warmup
  eta_min: 1.0e-6
  eval_every: 2                       # Denser validation cadence for smoother log tracking
  use_amp: true                       # AMP FP16 — leverages T4 Tensor Cores
  num_workers: 0                      # Avoid worker jitter/deadlock; matches prior logs
  pin_memory: true                    # Fast CPU→GPU transfer
  warmup_epochs: 3                    # 3 epoch warmup — stabilize before cosine decay
  weight_decay: 5.0e-5                # Moderate L2 — more data can handle more regularization
  pretrained_lr_ratio: 0.1            # Backbone LR = main_lr * 0.1
  unfreeze_after_epoch: 14            # Practical default: unfreeze late enough for stable adaptation
  prefetch_factor: 2                  # Only used when num_workers > 0

# ── Model Variants ──
model_variants:
  M1_Scratch_NoAttn:
    use_pretrained_cnn: false
    use_attention: false
    train_overrides:
      learning_rate: 3.6e-4
      weight_decay: 3.0e-5
      tf_end: 0.45
  M2_Scratch_Attn:
    use_pretrained_cnn: false
    use_attention: true
    train_overrides:
      learning_rate: 3.2e-4
      warmup_epochs: 4
      tf_end: 0.42
  M3_Pretrained_NoAttn:
    use_pretrained_cnn: true
    use_attention: false
    train_overrides:
      learning_rate: 2.8e-4
      pretrained_lr_ratio: 0.08
      unfreeze_after_epoch: 16
      weight_decay: 6.0e-5
  M4_Pretrained_Attn:
    use_pretrained_cnn: true
    use_attention: true
    train_overrides:
      learning_rate: 2.5e-4
      warmup_epochs: 4
      tf_end: 0.35
      pretrained_lr_ratio: 0.08
      unfreeze_after_epoch: 14
      weight_decay: 6.0e-5