# ═══════════════════════════════════════════════════════════════════
# VQA Project — Default Configuration (Final Optimized)
# ═══════════════════════════════════════════════════════════════════

seed: 42
device: "auto"          # auto | cuda | mps | cpu
log_dir: "logs"
ckpt_dir: "checkpoints"

# ── Data ──
data:
  hf_id: "HuggingFaceM4/A-OKVQA"
  train_ratio: 0.85                   # 85% train / 15% val from HF train split
  freq_threshold: 3                   # Đã cập nhật: min word frequency (lọc nhiễu cho rationale)
  image_size: 224                     # Đã cập nhật: 224 để tương thích chuẩn với ResNet-50
  expand_rationales: true             # 3× expansion using all rationales

# ── Model ──
model:
  embed_size: 300                     # GloVe 300d
  hidden_size: 256
  num_layers: 2                       # 2-layer LSTM
  dropout: 0.3
  use_pretrained_cnn: true            # ResNet-18 ImageNet (overridden per variant)
  use_attention: true                 # Spatial & Text attention (overridden per variant)

# ── Training ──
train:
  epochs: 20
  batch_size: 32                      # Đã cập nhật: Phù hợp với bộ nhớ GPU Mac (MPS)
  learning_rate: 3.0e-4
  label_smoothing: 0.1
  grad_clip: 5.0
  patience: 7                         # Early stopping patience
  beam_width: 10
  len_alpha: 0.6                      # Wu et al. 2016 length penalty
  rep_penalty: 1.2                    # Chống lặp từ khi sinh câu giải thích
  min_gen_len: 5                      # Đảm bảo câu trả lời không quá ngắn
  tf_start: 1.0                       # Teacher forcing start ratio
  tf_end: 0.0                         # Đã cập nhật: Cho phép tf rơi về 0 để Attention hoạt động độc lập
  scheduler: "cosine"                 # Cosine annealing
  eta_min: 1.0e-6
  eval_every: 2                       # Đánh giá full metrics mỗi 2 epoch
  use_amp: true                      # Tắt AMP để tránh lỗi crash trên chip MPS
  num_workers: 0                      # 0 trên macOS (tránh lỗi PIL pickle)
  pin_memory: true                   # Không dùng cho MPS
  warmup_epochs: 3

# ── Model Variants ──
model_variants:
  M1_Scratch_NoAttn:
    use_pretrained_cnn: false
    use_attention: false
  M2_Scratch_Attn:
    use_pretrained_cnn: false
    use_attention: true
  M3_Pretrained_NoAttn:
    use_pretrained_cnn: true
    use_attention: false
  M4_Pretrained_Attn:
    use_pretrained_cnn: true
    use_attention: true